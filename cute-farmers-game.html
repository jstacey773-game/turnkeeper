<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cute! Farmers</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0ede6;padding:12px}
h1{font-size:1.4rem;font-weight:700;color:#2d5a27;text-align:center;margin-bottom:4px}
.sub{text-align:center;color:#888;font-size:.8rem;margin-bottom:16px}
#lobby{max-width:380px;margin:0 auto}
.card{background:white;border-radius:12px;border:1px solid #e5e7eb;padding:16px;margin-bottom:12px}
.card h2{font-size:.8rem;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
input{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;font-size:1rem;margin-bottom:10px;outline:none}
.btn-row{display:flex;gap:8px}
.btn{flex:1;padding:10px;border:1.5px solid #d1d5db;border-radius:8px;font-size:.9rem;font-weight:600;background:white;cursor:pointer}
.btn.p1{border-color:#2563eb;color:#2563eb}
.btn.p2{border-color:#dc2626;color:#dc2626}
.hint{font-size:.72rem;color:#9ca3af;margin-top:8px}
#game{display:none;max-width:680px;margin:0 auto}
#topbar{display:flex;gap:8px;align-items:center;margin-bottom:8px}
#status{flex:1;background:white;border-radius:8px;padding:8px 12px;font-size:.85rem;font-weight:600;color:#111;border:1px solid #e5e7eb;text-align:center}
.sc{background:white;border-radius:8px;padding:6px 10px;font-size:.85rem;font-weight:700;border:1px solid #e5e7eb}
.sc.p1{color:#2563eb}.sc.p2{color:#dc2626}
#wrap{position:relative;background:white;border-radius:12px;border:1px solid #e5e7eb;overflow:hidden}
canvas{display:block;width:100%;height:auto;cursor:pointer;touch-action:none}
#info{margin-top:6px;background:white;border-radius:8px;padding:8px 12px;font-size:.8rem;color:#6b7280;border:1px solid #e5e7eb;text-align:center}
#panels{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.panel{background:white;border-radius:12px;border:1px solid #e5e7eb;padding:12px;flex:1;min-width:130px}
.panel h3{font-size:.72rem;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.ugrid{display:grid;grid-template-columns:1fr 1fr;gap:2px;font-size:.72rem;color:#6b7280}
.uk{display:flex;align-items:center;gap:3px}
.uk b{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:#e5e7eb;font-size:.6rem;color:#374151}
#logwrap{max-height:80px;overflow-y:auto}
.ll{font-size:.68rem;color:#6b7280;padding:2px 0;border-bottom:.5px solid #f3f4f6}
#endover{display:none;position:absolute;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
#endover.show{display:flex}
#endbox{background:white;border-radius:12px;padding:24px 32px;text-align:center}
#endbox h2{font-size:1.4rem;font-weight:700;color:#111}
#endbox p{font-size:.9rem;color:#6b7280;margin-top:4px}
#endbox button{margin-top:16px;padding:10px 24px;border-radius:8px;background:#2d5a27;color:white;border:none;font-size:.9rem;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<h1>Cute! Farmers</h1>
<p class="sub">2-Player Strategy Game</p>

<div id="lobby">
  <div class="card">
    <h2>Join a game</h2>
    <input id="roomcode" type="text" placeholder="Room code (e.g. farm42)" autocomplete="off">
    <div class="btn-row">
      <button class="btn p1" onclick="join(1)">Player 1 (Blue)</button>
      <button class="btn p2" onclick="join(2)">Player 2 (Red)</button>
    </div>
    <p class="hint">Both players use the same room code. Player 1 goes first.</p>
  </div>
</div>

<div id="game">
  <div id="topbar">
    <div id="status">-</div>
    <div class="sc p1">P1: <span id="s1">0</span></div>
    <div class="sc p2">P2: <span id="s2">0</span></div>
  </div>
  <div id="wrap">
    <canvas id="c"></canvas>
    <div id="endover">
      <div id="endbox">
        <h2 id="endtitle">-</h2>
        <p id="endsub">-</p>
        <button onclick="restart()">Play Again</button>
      </div>
    </div>
  </div>
  <div id="info">Click a unit to select it</div>
  <div id="panels">
    <div class="panel">
      <h3>Units</h3>
      <div class="ugrid">
        <div class="uk"><b>F</b>Farmer</div><div class="uk"><b>C</b>Cat</div>
        <div class="uk"><b>D</b>Dog</div><div class="uk"><b>P</b>Pig</div>
        <div class="uk"><b>B</b>Bunny</div><div class="uk"><b>N</b>Penguin</div>
        <div class="uk"><b>X</b>Dragon</div>
      </div>
    </div>
    <div class="panel" style="flex:2">
      <h3>Log</h3>
      <div id="logwrap"><div id="log"></div></div>
    </div>
    <div class="panel">
      <h3>Combat</h3>
      <p style="font-size:.7rem;color:#6b7280;line-height:1.5">Attacker first. Trades alternate. Jump units capture 2.</p>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB={apiKey:"AIzaSyBmTWP1qMGYxBjNsvly5TnE9Bwc2-vuKYA",authDomain:"cute-farmers-game.firebaseapp.com",databaseURL:"https://cute-farmers-game-default-rtdb.firebaseio.com",projectId:"cute-farmers-game",storageBucket:"cute-farmers-game.firebasestorage.app",messagingSenderId:"1058834161722",appId:"1:1058834161722:web:dd4651a5d63cf586399503"};
const db=getDatabase(initializeApp(FB));

// === HEX MATH ===
const R=6;
const DIRS=[[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]];
function h2p(q,r,sz){return{x:sz*1.5*q, y:sz*(Math.sqrt(3)*0.5*q+Math.sqrt(3)*r)}}
function p2h(x,y,sz){
  const q=(2/3*x)/sz, r=(-1/3*x+Math.sqrt(3)/3*y)/sz;
  let rq=Math.round(q),rs=Math.round(-q-r),rr=Math.round(r);
  const dq=Math.abs(rq-q),ds=Math.abs(rs-(-q-r)),dr=Math.abs(rr-r);
  if(dq>ds&&dq>dr)rq=-rs-rr; else if(ds>dr)rs=-rq-rr; else rr=-rq-rs;
  return{q:rq,r:rr};
}
function inB(q,r){return Math.abs(q)<=R&&Math.abs(r)<=R&&Math.abs(q+r)<=R}
function nbrs(q,r){return DIRS.map(([a,b])=>({q:q+a,r:r+b})).filter(h=>inB(h.q,h.r))}
function hk(q,r){return q+','+r}

// === STATE ===
let me=0,room='',state=null,selQ=null,selR=null,selN=0,mvs=[],atks=[];
const LBL={farmer:'F',cat:'C',dog:'D',pig:'P',bunny:'B',penguin:'N',dragon:'X'};

function at(st,q,r){return st.units.filter(u=>u.q===q&&u.r===r)}
function top(st,q,r){const a=at(st,q,r);return a.length?a[0]:null}

function mkState(){
  const u=[];
  [
    {t:'farmer',q:-5,r:2,p:1},{t:'cat',q:-5,r:3,p:1},{t:'cat',q:-4,r:3,p:1},
    {t:'dog',q:-5,r:4,p:1},{t:'dog',q:-4,r:4,p:1},
    {t:'pig',q:-3,r:2,p:1},{t:'pig',q:-3,r:3,p:1},
    {t:'bunny',q:-2,r:1,p:1},{t:'bunny',q:-2,r:2,p:1},
    {t:'penguin',q:-4,r:2,p:1},{t:'penguin',q:-3,r:1,p:1},
    {t:'dragon',q:-5,r:1,p:1},{t:'dragon',q:-4,r:1,p:1},
    {t:'farmer',q:5,r:-2,p:2},{t:'cat',q:5,r:-3,p:2},{t:'cat',q:4,r:-3,p:2},
    {t:'dog',q:5,r:-4,p:2},{t:'dog',q:4,r:-4,p:2},
    {t:'pig',q:3,r:-2,p:2},{t:'pig',q:3,r:-3,p:2},
    {t:'bunny',q:2,r:-1,p:2},{t:'bunny',q:2,r:-2,p:2},
    {t:'penguin',q:4,r:-2,p:2},{t:'penguin',q:3,r:-1,p:2},
    {t:'dragon',q:5,r:-1,p:2},{t:'dragon',q:4,r:-1,p:2}
  ].forEach((x,i)=>u.push({type:x.t,q:x.q,r:x.r,player:x.p,id:'u'+i}));
  return{units:u,turn:1,scores:{1:0,2:0},log:[],v:0};
}

// === MOVEMENT ===
function straightMoves(q,r,steps,st,type,player,n){
  const res=[];
  DIRS.forEach(([dq,dr])=>{
    for(let s=1;s<=steps;s++){
      const tq=q+dq*s,tr=r+dr*s;
      if(!inB(tq,tr))break;
      const occ=at(st,tq,tr);
      if(occ.length){
        // allow landing on same-type friendly if stack has room
        if(occ[0].type===type&&occ[0].player===player&&occ.length+n<=3)res.push({q:tq,r:tr});
        break; // always stop after hitting any unit
      }
      res.push({q:tq,r:tr});
    }
  });
  return res;
}

function calcMoves(q,r,n,st){
  const u=top(st,q,r);
  if(!u)return{mvs:[],atks:[]};
  const{type:t,player:p}=u;
  const en=p===1?2:1;
  const isEn=(a,b)=>{const x=at(st,a,b);return x.length&&x[0].player===en};
  let moves=[],attacks=[];

  if(t==='farmer'||t==='cat'||t==='dog'){
    moves=straightMoves(q,r,2,st,t,p,n);
    nbrs(q,r).forEach(nb=>{if(isEn(nb.q,nb.r))attacks.push({q:nb.q,r:nb.r})});
  } else if(t==='pig'){
    moves=straightMoves(q,r,2,st,t,p,n);
    DIRS.forEach(([dq,dr])=>{
      const tq=q+dq*2,tr=r+dr*2;
      if(inB(tq,tr)&&isEn(tq,tr))attacks.push({q:tq,r:tr,jump:true});
    });
  } else if(t==='bunny'){
    moves=straightMoves(q,r,2,st,t,p,n);
    DIRS.forEach(([dq,dr])=>{
      [3,4].forEach(d=>{
        const tq=q+dq*d,tr=r+dr*d;
        if(inB(tq,tr)&&isEn(tq,tr))attacks.push({q:tq,r:tr,jump:true});
      });
    });
  } else if(t==='penguin'){
    DIRS.forEach(([dq,dr])=>{
      let cq=q+dq,cr=r+dr,lastEmpty=null;
      while(inB(cq,cr)){
        const occ=at(st,cq,cr);
        if(occ.length){if(occ[0].player===en)attacks.push({q:cq,r:cr});break}
        lastEmpty={q:cq,r:cr};
        cq+=dq;cr+=dr;
      }
      if(lastEmpty)moves.push(lastEmpty);
    });
  } else if(t==='dragon'){
    const vis=new Set([hk(q,r)]);
    const queue=[{q,r,s:0}];
    while(queue.length){
      const c=queue.shift();
      if(c.s>0&&!at(st,c.q,c.r).length)moves.push({q:c.q,r:c.r});
      if(c.s<3)nbrs(c.q,c.r).forEach(nb=>{
        const k=hk(nb.q,nb.r);
        if(!vis.has(k)&&!at(st,nb.q,nb.r).length){vis.add(k);queue.push({q:nb.q,r:nb.r,s:c.s+1})}
      });
    }
    nbrs(q,r).forEach(nb=>{if(isEn(nb.q,nb.r))attacks.push({q:nb.q,r:nb.r,jump:true})});
  }


  const dd=a=>a.filter((x,i,s)=>s.findIndex(y=>y.q===x.q&&y.r===x.r)===i);
  return{mvs:dd(moves),atks:dd(attacks)};
}

// === COMBAT ===
function combat(atkers,defs,units){
  const nu=JSON.parse(JSON.stringify(units));
  const logs=[];
  let ap=[...atkers],dp=[...defs];
  const caps=atkers[0]&&atkers[0].jmp?2:1;
  const cf={1:0,2:0};
  while(ap.length&&dp.length){
    const c=Math.min(caps,dp.length);
    for(let i=0;i<c;i++){
      const d=dp.shift();
      if(d.type==='farmer')cf[d.player]++;
      const idx=nu.findIndex(u=>u.id===d.id);
      if(idx>=0)nu.splice(idx,1);
      logs.push(ap[0].type+' captured '+d.type);
    }
    if(!dp.length)break;
    const a=ap.shift();
    const idx=nu.findIndex(u=>u.id===a.id);
    if(idx>=0)nu.splice(idx,1);
    logs.push(dp[0].type+' captured '+a.type);
  }
  return{nu,logs,cf};
}

function applyMove(st,fq,fr,tq,tr,n,isAtk,isJump){
  const ns=JSON.parse(JSON.stringify(st));
  if(!ns.log)ns.log=[];
  if(!ns.scores)ns.scores={1:0,2:0};
  const movers=at(ns,fq,fr).slice(0,n);
  if(!movers.length)return ns;
  const ep=movers[0].player===1?2:1;
  if(isAtk){
    const defs=at(ns,tq,tr).filter(u=>u.player===ep);
    if(isJump)movers.forEach(m=>m.jmp=true);
    movers.forEach(m=>{m.q=tq;m.r=tr});
    const{nu,logs,cf}=combat(movers,defs,ns.units);
    ns.units=nu;
    logs.forEach(l=>ns.log.unshift(l));
    Object.entries(cf).forEach(([p,c])=>{
      if(c>0){ns.scores[movers[0].player]=(ns.scores[movers[0].player]||0)+8*c;ns.log.unshift('P'+movers[0].player+' captured Farmer! +8pts')}
    });
  } else {
    movers.forEach(m=>{m.q=tq;m.r=tr});
    ns.log.unshift('P'+movers[0].player+' moved '+n+' '+movers[0].type);
  }
  ns.turn=ep;
  ns.v=(ns.v||0)+1;
  ns.log=ns.log.slice(0,40);
  return ns;
}

// === CANVAS ===
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
let SZ=28; // hex size in canvas pixels

function resize(){
  const w=document.getElementById('wrap').clientWidth||400;
  cv.width=w; cv.height=Math.floor(w*1.2);
  SZ=Math.floor(w/16);
}

function drawHex(q,r,fill,stroke,lw){
  const{x,y}=h2p(q,r,SZ);
  const cx2=cv.width/2+x, cy2=cv.height/2+y;
  cx.beginPath();
  for(let i=0;i<6;i++){const a=i*Math.PI/3;cx.lineTo(cx2+SZ*0.93*Math.cos(a),cy2+SZ*0.93*Math.sin(a))}
  cx.closePath();
  cx.fillStyle=fill;cx.fill();
  cx.strokeStyle=stroke;cx.lineWidth=lw||1;cx.stroke();
}

function drawUnit(q,r,units,sel){
  const{x,y}=h2p(q,r,SZ);
  const cx2=cv.width/2+x, cy2=cv.height/2+y;
  const u=units[0];
  const col=u.player===1?'#2563eb':'#dc2626';
  const rad=SZ*0.5;
  cx.beginPath();cx.arc(cx2,cy2,rad,0,Math.PI*2);
  cx.fillStyle=sel?'#f59e0b':col;cx.fill();
  cx.strokeStyle='white';cx.lineWidth=2;cx.stroke();
  cx.fillStyle='white';
  cx.font='bold '+Math.floor(SZ*0.42)+'px system-ui';
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(LBL[u.type]||'?',cx2,cy2);
  if(units.length>1){
    cx.beginPath();cx.arc(cx2+rad*0.6,cy2-rad*0.6,rad*0.35,0,Math.PI*2);
    cx.fillStyle='#1e3a8a';cx.fill();
    cx.fillStyle='white';
    cx.font='bold '+Math.floor(SZ*0.3)+'px system-ui';
    cx.fillText(units.length,cx2+rad*0.6,cy2-rad*0.6);
  }
}

function draw(){
  if(!state)return;
  cx.clearRect(0,0,cv.width,cv.height);
  for(let q=-R;q<=R;q++)for(let r=-R;r<=R;r++){
    if(!inB(q,r))continue;
    const isSel=selQ===q&&selR===r;
    const isM=mvs.some(m=>m.q===q&&m.r===r);
    const isA=atks.some(a=>a.q===q&&a.r===r);
    let f='#f5f0e8',s='#d4c9b4',lw=1;
    if(isSel){f='#fef3c7';s='#f59e0b';lw=2}
    if(isM){f='#bbf7d0';s='#16a34a';lw=1.5}
    if(isA){f='#fecaca';s='#dc2626';lw=1.5}
    drawHex(q,r,f,s,lw);
  }
  const map={};
  state.units.forEach(u=>{const k=hk(u.q,u.r);if(!map[k])map[k]=[];map[k].push(u)});
  Object.entries(map).forEach(([k,us])=>{
    const[q,r]=k.split(',').map(Number);
    drawUnit(q,r,us,selQ===q&&selR===r);
  });
}

// === INPUT ===
function click(ex,ey){
  if(!state||state.turn!==me)return;
  const rect=cv.getBoundingClientRect();
  // Use CSS pixels directly — convert to canvas coords via scale
  const scale=cv.width/rect.width;
  const cpx=(ex-rect.left)*scale;
  const cpy=(ey-rect.top)*scale;
  // Offset from center
  const px=cpx-cv.width/2;
  const py=cpy-cv.height/2;
  const{q,r}=p2h(px,py,SZ);
  console.log('click px='+px.toFixed(0)+' py='+py.toFixed(0)+' -> hex='+q+','+r+' SZ='+SZ+' mvs='+mvs.length+' sel='+selQ+','+selR);
  if(!inB(q,r))return;

  // Move?
  if(selQ!==null&&mvs.some(m=>m.q===q&&m.r===r)){
    push(applyMove(state,selQ,selR,q,r,selN,false,false));
    clr();return;
  }
  // Attack?
  if(selQ!==null&&atks.some(a=>a.q===q&&a.r===r)){
    const a=atks.find(a=>a.q===q&&a.r===r);
    push(applyMove(state,selQ,selR,q,r,selN,true,a.jump||false));
    clr();return;
  }
  // Select own unit?
  const mine=at(state,q,r).filter(u=>u.player===me);
  if(mine.length){
    selQ=q;selR=r;selN=mine.length;
    const res=calcMoves(q,r,mine.length,state);
    mvs=res.mvs;atks=res.atks;
    document.getElementById('info').textContent=mine.length+' '+mine[0].type+(mine.length>1?'s':'')+' selected — green=move, red=attack';
    draw();return;
  }
  clr();
}

function clr(){selQ=null;selR=null;selN=0;mvs=[];atks=[];draw();document.getElementById('info').textContent='Click a unit to select it'}

cv.addEventListener('click',e=>click(e.clientX,e.clientY));
cv.addEventListener('touchend',e=>{e.preventDefault();const t=e.changedTouches[0];click(t.clientX,t.clientY)},{passive:false});
window.addEventListener('resize',()=>{resize();draw()});

// === UI ===
function ui(){
  if(!state)return;
  const myTurn=state.turn===me;
  document.getElementById('status').textContent=myTurn?'Your turn — Player '+me:'Waiting for Player '+state.turn+'…';
  document.getElementById('s1').textContent=state.scores[1]||0;
  document.getElementById('s2').textContent=state.scores[2]||0;
  document.getElementById('log').innerHTML=(state.log||[]).map(l=>'<div class="ll">'+l+'</div>').join('');
  const w=((state.scores[1]||0)>=20)?1:((state.scores[2]||0)>=20)?2:null;
  if(w){
    document.getElementById('endtitle').textContent='Player '+w+' wins!';
    document.getElementById('endsub').textContent=w===me?'You won!':'Better luck next time.';
    document.getElementById('endover').classList.add('show');
  }
  draw();
}

// === FIREBASE ===
function push(ns){state=ns;ui();set(ref(db,'games/'+room),ns)}

window.restart=function(){
  document.getElementById('endover').classList.remove('show');
  clr();push(mkState());
};

window.join=function(player){
  const code=document.getElementById('roomcode').value.trim();
  if(!code){alert('Enter a room code');return}
  room=code;me=player;
  document.getElementById('lobby').style.display='none';
  document.getElementById('game').style.display='block';
  setTimeout(()=>{
    resize();
    onValue(ref(db,'games/'+room),snap=>{
      const d=snap.val();
      if(!d){document.getElementById('status').textContent='Waiting for Player 1…';return}
      if(!state||d.v>=state.v){state=d;clr();ui()}
    });
    if(player===1)push(mkState());
  },60);
};
</script>
</body>
</html>
